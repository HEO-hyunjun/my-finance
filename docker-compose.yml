services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      # 컨테이너 내부에서는 서비스명으로 접속 (env_file 값을 오버라이드)
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-myfinance}:${POSTGRES_PASSWORD:-myfinance}@db:5432/${POSTGRES_DB:-myfinance}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-myfinance}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-myfinance}
      - POSTGRES_DB=${POSTGRES_DB:-myfinance}
    volumes:
      - ./volume/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myfinance"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./volume/redis:/data

  migrate:
    profiles:
      - migration
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-myfinance}:${POSTGRES_PASSWORD:-myfinance}@db:5432/${POSTGRES_DB:-myfinance}
    depends_on:
      db:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-myfinance}:${POSTGRES_PASSWORD:-myfinance}@db:5432/${POSTGRES_DB:-myfinance}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-myfinance}:${POSTGRES_PASSWORD:-myfinance}@db:5432/${POSTGRES_DB:-myfinance}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - celery-worker
